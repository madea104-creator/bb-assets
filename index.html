<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產總覽 - 2026 全能修復版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#1a2030; --surface:#232d3f; --border:#3a4d65; --accent:#f5d87a; --text:#f0f4fa; --dim:#8fa8c0; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;padding:20px}
  .app{max-width:600px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;border-bottom:1px solid var(--border);padding-bottom:15px}
  .hero{background:linear-gradient(135deg,var(--surface) 0%,#1a2535 100%);border-radius:16px;padding:35px;margin-bottom:25px;border:1px solid var(--border);text-align:center}
  .hero-amount{font-size:38px;color:var(--accent);margin-top:10px;font-family:'DM Mono',monospace}
  .asset-card{background:var(--surface);border-radius:12px;padding:15px;margin-bottom:10px;border:1px solid var(--border);display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}
  .price-tag{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(94,207,176,.1);color:#5ecfb0;margin-top:5px;display:inline-block}
  .btn-edit{padding:6px 12px;background:rgba(245,216,122,0.1);border:1px solid var(--accent);color:var(--accent);border-radius:6px;font-size:13px;cursor:pointer}
  .btn-del{padding:6px 12px;background:transparent;border:1px solid rgba(240,122,96,0.3);color:#f07a60;border-radius:6px;font-size:13px;cursor:pointer}
  
  /* 彈窗：強制亮色底黑字，確保看得到文字 */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;align-items:center;justify-content:center;padding:15px}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;padding:25px;border-radius:16px;width:100%;max-width:450px;color:#000;max-height:90vh;overflow-y:auto}
  .modal label{display:block;margin-bottom:5px;font-size:14px;font-weight:700;color:#333}
  .modal input, .modal select{width:100%;background:#f0f2f5;border:2px solid #ccc;padding:12px;color:#000;border-radius:8px;margin-bottom:15px;font-size:16px}
  .btn-save{width:100%;padding:16px;background:#f5d87a;color:#1a2030;border:none;border-radius:10px;font-weight:700;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <header>
    <div style="font-size:24px;font-weight:700;color:var(--accent)">Wealth Tracker</div>
    <button style="padding:6px 12px;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:6px" id="refBtn" onclick="refreshAll()">↻ 更新報價</button>
  </header>
  <div class="hero">
    <div style="font-size:14px;color:var(--dim)">總資產淨值 (TWD)</div>
    <div class="hero-amount" id="totalValue">NT$ 0</div>
  </div>
  <div id="list"></div>
  <button style="width:100%;padding:18px;background:var(--accent);color:#1a2030;border:none;border-radius:12px;font-weight:700;margin-top:20px;cursor:pointer" onclick="openModal()">＋ 新增資產項目</button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="mTitle" style="margin-bottom:20px">編輯資產項目</h3>
    <label>資產名稱</label>
    <input id="name" placeholder="例: Bitcoin / 台積電">
    <label>資產類別</label>
    <select id="type" onchange="toggle()">
      <option value="invest">投資 (股票 / CB / 加密貨幣)</option>
      <option value="cash">台幣存款 / 其他 (手動金額)</option>
      <option value="fxcash">外幣存款 (USD / JPY)</option>
    </select>
    <div id="investGroup">
      <label>代號 / 市場</label>
      <div style="display:flex;gap:10px">
        <input id="ticker" placeholder="例: bitcoin / 2330" style="flex:1">
        <select id="mkt" style="flex:1">
          <option value="tw">台灣股票 (.TW)</option>
          <option value="us">美國股票 (USD)</option>
          <option value="crypto">加密貨幣 (CoinGecko ID)</option>
        </select>
      </div>
      <label>數量 (股數 / 枚 / 張)</label>
      <input id="qty" type="number" placeholder="請輸入持有數量">
    </div>
    <div id="fxGroup" style="display:none">
      <label>幣別與金額</label>
      <div style="display:flex;gap:10px">
        <select id="ccy" style="flex:1"><option value="USD">USD</option><option value="JPY">JPY</option></select>
        <input id="fxAmt" type="number" placeholder="外幣總額" style="flex:1">
      </div>
    </div>
    <div id="cashGroup" style="display:none">
      <label>台幣總金額 (NT$)</label>
      <input id="amount" type="number" placeholder="輸入總額">
    </div>
    <button class="btn-save" onclick="save()">儲存並計算</button>
    <button style="width:100%;background:transparent;border:none;color:#666;margin-top:15px;cursor:pointer" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
let assets = JSON.parse(localStorage.getItem('wt_final_full_v8') || '[]');
const rates = { USD: 32.5, JPY: 0.211 };
let editIdx = -1;

function toggle() {
  const t = document.getElementById('type').value;
  document.getElementById('investGroup').style.display = t === 'invest' ? 'block' : 'none';
  document.getElementById('fxGroup').style.display = t === 'fxcash' ? 'block' : 'none';
  document.getElementById('cashGroup').style.display = t === 'cash' ? 'block' : 'none';
}

async function fetchPrice(a) {
  if (a.type !== 'invest') return;
  const proxy = 'https://corsproxy.io/?';
  try {
    let url = '';
    if (a.mkt === 'crypto') {
      url = `https://api.coingecko.com/api/v3/simple/price?ids=${a.ticker.toLowerCase()}&vs_currencies=twd`;
      const r = await fetch(proxy + encodeURIComponent(url));
      const d = await r.json();
      a.price = d[a.ticker.toLowerCase()].twd;
      a.mktCurrency = 'TWD';
    } else {
      const sym = a.mkt === 'tw' ? a.ticker + '.TW' : a.ticker;
      url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1m&range=1d`;
      const r = await fetch(proxy + encodeURIComponent(url));
      const d = await r.json();
      a.price = d.chart.result[0].meta.regularMarketPrice;
      a.mktCurrency = a.mkt === 'us' ? 'USD' : 'TWD';
    }
  } catch (e) {
    if (!a.price) a.price = parseFloat(prompt(`[${a.name}] 報價失敗，請輸入今日單價:`)) || 0;
  }
}

function render() {
  const list = document.getElementById('list'); list.innerHTML = ''; let total = 0;
  assets.forEach((a, i) => {
    let val = 0;
    if (a.type === 'cash') val = a.amount;
    else if (a.type === 'fxcash') val = a.fxAmt * rates[a.ccy];
    else {
      let p = a.price || 0;
      if (a.ticker.length === 5 && a.mkt === 'tw') val = (p/100)*a.qty*100000;
      else val = p * a.qty * (a.mktCurrency === 'USD' ? rates.USD : 1);
    }
    total += val;
    list.innerHTML += `<div class="asset-card">
      <div><div style="font-weight:700">${a.name}</div><span class="price-tag">${a.price?'單價: '+a.price:'點擊更新'}</span></div>
      <div style="text-align:right"><div style="font-family:'DM Mono';font-weight:700">NT$ ${Math.round(val).toLocaleString()}</div>
      <div style="margin-top:8px"><button class="btn-edit" onclick="edit(${i})">✎ 修改</button> <button class="btn-del" onclick="del(${i})">✕</button></div></div>
    </div>`;
  });
  document.getElementById('totalValue').textContent = 'NT$ ' + Math.round(total).toLocaleString();
}

function openModal() { editIdx = -1; document.getElementById('mTitle').textContent='新增資產'; document.getElementById('modal').classList.add('open'); toggle(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function save() {
  const a = {
    name: document.getElementById('name').value, type: document.getElementById('type').value,
    ticker: document.getElementById('ticker').value, qty: parseFloat(document.getElementById('qty').value) || 0,
    mkt: document.getElementById('mkt').value, fxAmt: parseFloat(document.getElementById('fxAmt').value) || 0,
    ccy: document.getElementById('ccy').value, amount: parseFloat(document.getElementById('amount').value) || 0,
    price: (editIdx > -1) ? assets[editIdx].price : 0
  };
  if (a.type === 'invest') await fetchPrice(a);
  if (editIdx > -1) assets[editIdx] = a; else assets.push(a);
  localStorage.setItem('wt_final_full_v8', JSON.stringify(assets));
  closeModal(); render();
}

function edit(i) {
  editIdx = i; const a = assets[i]; document.getElementById('mTitle').textContent='修改資產項目';
  document.getElementById('name').value=a.name; document.getElementById('type').value=a.type;
  document.getElementById('ticker').value=a.ticker; document.getElementById('qty').value=a.qty;
  document.getElementById('fxAmt').value=a.fxAmt; document.getElementById('ccy').value=a.ccy;
  document.getElementById('amount').value=a.amount; document.getElementById('mkt').value=a.mkt;
  document.getElementById('modal').classList.add('open'); toggle();
}

function del(i) { if(confirm('確定刪除？')) { assets.splice(i,1); localStorage.setItem('wt_final_full_v8', JSON.stringify(assets)); render(); } }
async function refreshAll() { 
  const btn = document.getElementById('refBtn'); btn.textContent = '更新中...';
  for (let a of assets) await fetchPrice(a);
  btn.textContent = '↻ 更新報價'; render();
}
render();
</script>
</body>
</html>
