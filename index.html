<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產總覽 - 穩定修復版</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a2030; --surface:#232d3f; --surface2:#2a3650; --border:#3a4d65;
    --accent:#f5d87a; --accent2:#5ecfb0; --text:#f0f4fa;
    --muted:#8fa8c0; --dim:#b8cfe0;
    --pos:#5ecfb0; --neg:#f07a60; --shadow:0 8px 32px rgba(0,0,0,.4);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
  .app{max-width:1100px;margin:0 auto;padding:40px 24px}
  header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;border-bottom:1px solid var(--border);padding-bottom:20px}
  .logo{font-family:'Playfair Display',serif;font-size:32px;color:var(--accent)}
  .hero{background:linear-gradient(135deg,var(--surface) 0%,#1a2535 100%);border:1px solid var(--border);border-radius:16px;padding:44px;margin-bottom:32px;box-shadow:var(--shadow)}
  .hero-amount{font-family:'Playfair Display',serif;font-size:54px;color:var(--accent)}
  .refresh-btn{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace}
  .asset-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .price-tag{font-family:'DM Mono',monospace;font-size:12px;padding:3px 8px;border-radius:4px;background:rgba(94,207,176,.1);color:var(--accent2)}
  .price-tag.loading{color:var(--muted);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .add-btn{width:100%;padding:15px;background:transparent;border:1px dashed var(--border);border-radius:12px;color:var(--dim);cursor:pointer;margin-top:20px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Wealth Tracker</div>
    <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
  </header>
  <div class="hero">
    <div style="font-size:13px;color:var(--dim);margin-bottom:10px">NET WORTH</div>
    <div class="hero-amount" id="netWorthDisplay">NT$ 0</div>
  </div>
  <div id="assetList"></div>
  <button class="add-btn" onclick="addNewAsset()">＋ 新增資產或股票</button>
</div>

<script>
// 使用更穩定的公用 Proxy
const CF_WORKER = 'https://corsproxy.io/?'; 

let assets = JSON.parse(localStorage.getItem('wt_assets_v3') || '[]');
let fxRates = { USD: 32.5, JPY: 0.21 }; // 預設匯率

async function fetchPrice(a) {
  const tag = document.getElementById(`tag-${a.id}`);
  if(tag) tag.className = 'price-tag loading';

  try {
    let url = '';
    if(a.type === 'tw') url = `https://query1.finance.yahoo.com/v8/finance/chart/${a.ticker}.TW`;
    else if(a.type === 'us') url = `https://query1.finance.yahoo.com/v8/finance/chart/${a.ticker}`;
    
    const r = await fetch(CF_WORKER + encodeURIComponent(url));
    const d = await r.json();
    const price = d.chart.result[0].meta.regularMarketPrice;
    
    a.currentPrice = price;
    if(tag) {
      tag.textContent = `P: ${price}`;
      tag.className = 'price-tag';
    }
  } catch (e) {
    if(tag) {
      tag.textContent = '需手動更新';
      tag.className = 'price-tag';
    }
  }
  render();
}

function render() {
  const list = document.getElementById('assetList');
  list.innerHTML = '';
  let total = 0;

  assets.forEach(a => {
    let value = (a.currentPrice || 0) * (a.qty || 0);
    if(a.type === 'us') value *= fxRates.USD;
    total += value;

    const div = document.createElement('div');
    div.className = 'asset-card';
    div.innerHTML = `
      <div>
        <div style="font-weight:500">${a.name} (${a.ticker})</div>
        <span class="price-tag" id="tag-${a.id}">${a.currentPrice ? 'P: '+a.currentPrice : '載入中...'}</span>
      </div>
      <div style="font-family:'DM Mono',monospace">NT$ ${Math.round(value).toLocaleString()}</div>
    `;
    list.appendChild(div);
  });
  document.getElementById('netWorthDisplay').textContent = 'NT$ ' + Math.round(total).toLocaleString();
}

function addNewAsset() {
  const name = prompt("名稱 (例如: 台積電)");
  const ticker = prompt("代號 (例如: 2330 或 NVDA)");
  const qty = prompt("持有數量");
  const type = prompt("類型 (輸入 tw 或 us)");
  
  if(name && ticker && qty) {
    const newAsset = { id: Date.now(), name, ticker, qty: parseFloat(qty), type: type || 'tw' };
    assets.push(newAsset);
    localStorage.setItem('wt_assets_v3', JSON.stringify(assets));
    fetchPrice(newAsset);
  }
}

function refreshAll() {
  assets.forEach(a => fetchPrice(a));
}

render();
if(assets.length > 0) refreshAll();
</script>
</body>
</html>
