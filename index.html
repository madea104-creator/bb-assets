<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產總覽</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a2030; --surface:#232d3f; --surface2:#2a3650; --border:#3a4d65;
    --accent:#f5d87a; --accent2:#5ecfb0; --text:#f0f4fa;
    --muted:#8fa8c0; --dim:#b8cfe0;
    --pos:#5ecfb0; --neg:#f07a60; --shadow:0 8px 32px rgba(0,0,0,.4);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:400;font-size:16px;min-height:100vh;overflow-x:hidden}
  .app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px}
  header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)}
  .logo{font-family:'Playfair Display',serif;font-size:32px;color:var(--accent)}
  .hero{background:linear-gradient(135deg,var(--surface) 0%,#1a2535 100%);border:1px solid var(--border);border-radius:16px;padding:44px 52px;margin-bottom:32px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .hero-amount{font-family:'Playfair Display',serif;font-size:64px;font-weight:700;color:var(--accent)}
  .asset-group{margin-bottom:28px}
  .group-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .asset-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;margin-bottom:8px}
  .price-tag{font-family:'DM Mono',monospace;font-size:12px;padding:3px 9px;border-radius:4px;background:rgba(94,207,176,.12);color:var(--accent2)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
  .form-input,.form-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);margin-bottom:10px}
  .btn-primary{width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">資產追蹤<span>WEALTH TRACKER</span></div>
    <button style="padding:8px 16px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px" onclick="refreshAll()">↻ 更新報價</button>
  </header>

  <div class="hero">
    <div style="font-size:13px;color:var(--dim);margin-bottom:12px">總淨資產 NET WORTH</div>
    <div class="hero-amount" id="netWorthDisplay">NT$ 0</div>
  </div>

  <div id="groupsContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 style="color:var(--accent);margin-bottom:20px">新增/編輯資產</h2>
    <input class="form-input" id="inputName" placeholder="名稱 (例: 台銀存款)">
    <select class="form-select" id="inputCategory" onchange="onCatChange()">
      <option value="cash">台幣存款</option>
      <option value="fxcash">台灣外幣存款</option>
      <option value="overseas">海外存款 (外幣)</option>
      <option value="invest">投資 (股票/CB/幣)</option>
      <option value="property">不動產</option>
      <option value="debt">負債</option>
    </select>
    
    <div id="fxSection" style="display:none">
      <select class="form-select" id="inputCurrency">
        <option value="USD">USD 美元</option>
        <option value="JPY">JPY 日圓</option>
      </select>
      <input class="form-input" id="inputFxAmount" type="number" placeholder="原始外幣金額">
    </div>

    <div id="investSection" style="display:none">
      <select class="form-select" id="inputTT">
        <option value="tw">🇹🇼 台股</option>
        <option value="us">🇺🇸 美股</option>
        <option value="cb">📄 可轉債 (CB)</option>
        <option value="crypto">₿ 加密貨幣</option>
      </select>
      <input class="form-input" id="inputTicker" placeholder="代號 (例: 2330)">
      <input class="form-input" id="inputQty" type="number" placeholder="數量 (股/張/枚)">
    </div>

    <input class="form-input" id="inputAmount" type="number" placeholder="總金額 (台幣)">
    
    <button class="btn-primary" onclick="saveAsset()">儲存並關閉</button>
    <button style="width:100%;background:transparent;border:none;color:var(--muted);margin-top:15px" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
// 修正後的 Proxy 傳送門
const CF_WORKER = 'https://corsproxy.io/?'; 
let assets = JSON.parse(localStorage.getItem('wt_assets_v3') || '[]');
let fxRates = { USD: 32.5, JPY: 0.211, EUR: 34.8 };
let stockPrices = {};

function onCatChange() {
  const cat = document.getElementById('inputCategory').value;
  document.getElementById('fxSection').style.display = (cat === 'fxcash' || cat === 'overseas') ? '' : 'none';
  document.getElementById('investSection').style.display = (cat === 'invest') ? '' : 'none';
  document.getElementById('inputAmount').style.display = (cat === 'invest' || cat === 'fxcash' || cat === 'overseas') ? 'none' : '';
}

async function fetchPrice(a) {
  if (a.category !== 'invest') return;
  try {
    let url = (a.tt === 'us') ? 
      `https://query1.finance.yahoo.com/v8/finance/chart/${a.ticker}` : 
      `https://query1.finance.yahoo.com/v8/finance/chart/${a.ticker}.TW`;
    const r = await fetch(CF_WORKER + encodeURIComponent(url));
    const d = await r.json();
    stockPrices[a.ticker] = d.chart.result[0].meta.regularMarketPrice;
  } catch (e) { console.error(e); }
}

function assetTWD(a) {
  if (a.category === 'fxcash' || a.category === 'overseas') return a.fxAmt * (fxRates[a.fxCcy] || 0);
  if (a.category === 'invest') {
    const p = stockPrices[a.ticker] || 0;
    let v = p * a.qty;
    if (a.tt === 'cb') v = (p / 100) * a.qty * 100000;
    if (a.tt === 'us') v *= fxRates.USD;
    return v;
  }
  return a.amount || 0;
}

function render() {
  const con = document.getElementById('groupsContainer');
  con.innerHTML = '';
  let totalNW = 0;

  const cats = { cash:'台幣存款', fxcash:'外幣存款', overseas:'海外存款', invest:'投資項目', property:'不動產', debt:'負債' };
  
  Object.keys(cats).forEach(cat => {
    const list = assets.filter(a => a.category === cat);
    if (list.length === 0) return;
    
    let gTotal = 0;
    const grp = document.createElement('div');
    grp.className = 'asset-group';
    grp.innerHTML = `<div class="group-header"><div style="color:var(--dim)">${cats[cat]}</div><div id="gt-${cat}"></div></div><div id="grid-${cat}"></div>`;
    con.appendChild(grp);

    list.forEach(a => {
      const val = assetTWD(a);
      if (cat === 'debt') gTotal -= val; else gTotal += val;
      document.getElementById(`grid-${cat}`).innerHTML += `
        <div class="asset-card">
          <div><div>${a.name}</div><span class="price-tag">${a.ticker || '固定'}</span></div>
          <div style="text-align:right">NT$ ${Math.round(val).toLocaleString()}</div>
        </div>`;
    });
    totalNW += gTotal;
    document.getElementById(`gt-${cat}`).textContent = 'NT$ ' + Math.round(Math.abs(gTotal)).toLocaleString();
  });
  document.getElementById('netWorthDisplay').textContent = 'NT$ ' + Math.round(totalNW).toLocaleString();
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); onCatChange(); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function saveAsset() {
  const a = {
    id: Date.now(),
    name: document.getElementById('inputName').value,
    category: document.getElementById('inputCategory').value,
    fxCcy: document.getElementById('inputCurrency').value,
    fxAmt: parseFloat(document.getElementById('inputFxAmount').value) || 0,
    tt: document.getElementById('inputTT').value,
    ticker: document.getElementById('inputTicker').value,
    qty: parseFloat(document.getElementById('inputQty').value) || 0,
    amount: parseFloat(document.getElementById('amount').value) || 0
  };
  assets.push(a);
  localStorage.setItem('wt_assets_v3', JSON.stringify(assets));
  if (a.category === 'invest') await fetchPrice(a);
  closeModal(); render();
}

async function refreshAll() {
  for (const a of assets) { if (a.category === 'invest') await fetchPrice(a); }
  render();
}

render();
</script>
</body>
</html>
