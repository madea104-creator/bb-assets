<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的資產總覽 - 穩定版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#1a2030; --surface:#232d3f; --border:#3a4d65; --accent:#f5d87a; --text:#f0f4fa; --dim:#8fa8c0; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;padding:20px}
  .app{max-width:500px;margin:0 auto}
  .hero{background:var(--surface);border-radius:16px;padding:30px;margin-bottom:20px;border:1px solid var(--border);text-align:center}
  .hero-amount{font-size:36px;color:var(--accent);margin-top:10px;font-family:'DM Mono',monospace}
  .asset-card{background:var(--surface);border-radius:12px;padding:15px;margin-bottom:10px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .price-tag{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(94,207,176,.1);color:#5ecfb0}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;align-items:center;justify-content:center;padding:15px}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;padding:25px;border-radius:16px;width:100%;max-width:400px;color:#000}
  .modal input, .modal select{width:100%;background:#f0f2f5;border:1px solid #ccc;padding:12px;color:#000;border-radius:8px;margin-bottom:15px;font-size:16px}
  .btn-save{width:100%;padding:15px;background:#f5d87a;color:#1a2030;border:none;border-radius:10px;font-weight:700;font-size:18px}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div style="font-size:14px;color:var(--dim)">資產總淨值 (TWD)</div>
    <div class="hero-amount" id="totalValue">NT$ 0</div>
    <button style="margin-top:15px;padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:5px" onclick="refreshAll()">強制更新報價</button>
  </div>
  <div id="list"></div>
  <button style="width:100%;padding:18px;background:var(--accent);color:#1a2030;border:none;border-radius:12px;font-weight:700;margin-top:10px" onclick="openModal()">＋ 新增資產 (存款/股票/CB)</button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 style="margin-bottom:20px">新增資產</h3>
    <input id="name" placeholder="名稱 (例: 台積電)">
    <select id="type" onchange="toggle()">
      <option value="cash">台幣存款 / 其他 (手動金額)</option>
      <option value="fxcash">外幣存款 (自動換匯)</option>
      <option value="stock">股票 / CB / 幣 (自動報價)</option>
    </select>
    <div id="stockDiv" style="display:none">
      <input id="ticker" placeholder="代號 (例: 2330 / NVDA / 37012)">
      <input id="qty" type="number" placeholder="持有數量">
      <select id="market"><option value="tw">台灣市場 (.TW)</option><option value="us">美國市場 (USD)</option></select>
    </div>
    <div id="fxDiv" style="display:none">
      <select id="ccy"><option value="USD">USD 美金</option><option value="JPY">JPY 日圓</option></select>
      <input id="fxAmt" type="number" placeholder="外幣金額">
    </div>
    <div id="cashDiv">
      <input id="amount" type="number" placeholder="台幣總金額">
    </div>
    <button class="btn-save" onclick="save()">儲存資產</button>
    <button style="width:100%;margin-top:10px;background:transparent;border:none;color:#666" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
let assets = JSON.parse(localStorage.getItem('my_assets_final_v1') || '[]');
const rates = { USD: 32.5, JPY: 0.211 };

function toggle() {
  const t = document.getElementById('type').value;
  document.getElementById('stockDiv').style.display = t==='stock'?'block':'none';
  document.getElementById('fxDiv').style.display = t==='fxcash'?'block':'none';
  document.getElementById('cashDiv').style.display = t==='cash'?'block':'none';
}

async function getPrice(a) {
  if (a.type !== 'stock') return;
  const proxy = 'https://corsproxy.io/?';
  const sym = a.market === 'tw' ? a.ticker + '.TW' : a.ticker;
  try {
    const r = await fetch(proxy + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1m&range=1d`));
    const d = await r.json();
    a.price = d.chart.result[0].meta.regularMarketPrice;
  } catch (e) {
    if (!a.price) a.price = parseFloat(prompt(`[${a.name}] 報價抓取失敗，請手動輸入當前價格:`)) || 0;
  }
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  let total = 0;
  assets.forEach((a, i) => {
    let val = 0;
    if (a.type === 'cash') val = a.amount;
    else if (a.type === 'fxcash') val = a.fxAmt * rates[a.ccy];
    else {
      let p = a.price || 0;
      val = a.ticker.length === 5 ? (p/100)*a.qty*100000 : p*a.qty*(a.market==='us'?rates.USD:1);
    }
    total += val;
    list.innerHTML += `<div class="asset-card" onclick="del(${i})">
      <div><div>${a.name}</div><span class="price-tag">${a.price?'價格: '+a.price:'自動換算'}</span></div>
      <div style="font-family:'DM Mono'">NT$ ${Math.round(val).toLocaleString()}</div>
    </div>`;
  });
  document.getElementById('totalValue').textContent = 'NT$ ' + Math.round(total).toLocaleString();
}

function openModal() { document.getElementById('modal').classList.add('open'); toggle(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function save() {
  const a = {
    name: document.getElementById('name').value,
    type: document.getElementById('type').value,
    ticker: document.getElementById('ticker').value,
    qty: parseFloat(document.getElementById('qty').value) || 0,
    market: document.getElementById('market').value,
    fxAmt: parseFloat(document.getElementById('fxAmt').value) || 0,
    ccy: document.getElementById('ccy').value,
    amount: parseFloat(document.getElementById('amount').value) || 0,
    price: 0
  };
  if (a.type === 'stock') await getPrice(a);
  assets.push(a);
  localStorage.setItem('my_assets_final_v1', JSON.stringify(assets));
  closeModal(); render();
}

async function refreshAll() {
  for (let a of assets) if (a.type === 'stock') await getPrice(a);
  render();
}

function del(i) { if(confirm('刪除此項？')) { assets.splice(i,1); localStorage.setItem('my_assets_final_v1', JSON.stringify(assets)); render(); } }

render();
</script>
</body>
</html>
